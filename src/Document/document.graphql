enum DocumentStatus {
  PENDING
  PROCESSED
  FINISHED
}

enum SortByDeadline {
  desc
  asc
}

type Document {
  id: ID!
  receivedDate: String!
  documentCode: String!
  content: String!
  processProof: String
  processAddress: String!
  processDeadline: String!
  processStatus: DocumentStatus!
  pricePerDocument: Int!
  travelDistance: Int
  gasFee: Int
  innerTotalPrice: Int
  outerTotalPrice: Int
  courtStaff: CourtStaff
  note: String
  court: Court!

  isLate: Boolean!
}

type DocumentList {
  id: ID!
  sentByCourt: Court!
  sentAt: String!
  fileUrl: String!
}

input DocumentFilter {
  courtId: ID!
  deadlineStart: String
  deadlineEnd: String
  documentStatus: DocumentStatus
  sort: SortByDeadline
}

input DocumentPayload {
  receiveDate: String!
  documentCode: String!
  content: String!
  processProof: String
  processAddress: String!
  processDeadline: String!
  pricePerDocument: Int!
  travelDistance: Int
  courtStaff: String
  note: String
  court: String!
}


extend type Query {
  documents: [Document!]!
  documentsByCourtId(documentFilter: DocumentFilter!): [Document!]!
  document(id: ID!): Document!
  documentLists: [DocumentList!]!
}

type Mutation {
  createMutation(createMutationRequest: DocumentPayload!): Document!
  createFromImport(createFromImportRequest: [DocumentPayload!]!): [Document!]!
}
