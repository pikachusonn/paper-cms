scalar DateTime

# 1. TYPE VĂN BẢN (Cập nhật theo Schema Prisma MỚI)
type Document {
  id: ID!
  docCode: String!     # Mã văn bản
  docType: String      # Trích yếu
  recipient: String    # Người nhận
  address: String      # Địa chỉ nhận
  
  receivedDate: DateTime 
  dueDate: DateTime      # Hạn tống đạt
  
  status: DocumentStatus! 

  # Kết quả xử lý
  evidenceUrl: String    # Ảnh bằng chứng
  deliveryMethod: String
  content: String        # Ghi chú / Nội dung
  
  # 👇 MỚI: Người chịu trách nhiệm (Object lấy từ bảng CourtOfficial)
  responsibleOfficial: CourtOfficial 
  
  # 👇 MỚI: Người tạo/nhập liệu (Object lấy từ bảng Account)
  creator: Account
  
  # Chi phí
  distance: Float       
  cost: Float            
  fuelCost: Float        
  otherCost: Float
  totalCost: Float       

  # Field tính toán (Frontend dùng để bôi màu)
  isOverdue: Boolean 
  isUrgent: Boolean

  # Quan hệ
  court: Court!
}

# 2. TYPE CHO DANH SÁCH PHÂN TRANG
type CourtDocStats {
  waiting: Int!
  overdue: Int!
}

type DocumentPagination {
  data: [Document!]!
  total: Int!
  page: Int!
  limit: Int!
  totalPages: Int!
  statHeader: CourtDocStats! 
}

# 3. INPUTS (Dữ liệu đầu vào)

# Input lọc danh sách
input GetDocsFilterInput {
  courtId: String!
  year: Int!
  status: DocumentStatus 
  page: Int
  limit: Int
  search: String
}

# Input tạo mới (Khớp với Popup thiết kế)
input CreateDocumentInput {
  courtId: String!
  docCode: String!
  docType: String!
  recipient: String!
  address: String
  receivedDate: DateTime
  dueDate: DateTime!
  
  # 👇 MỚI: Gửi ID của thư ký (chọn từ dropdown) thay vì nhập tên string
  responsibleOfficialId: String 
  
  deliveryMethod: String
  content: String
  
  # Các chi phí (nếu nhập luôn lúc tạo)
  distance: Float
  cost: Float
  fuelCost: Float
  otherCost: Float
  totalCost: Float
}

# Input cập nhật (Cho phép sửa cả thông tin sai + nhập kết quả)
input UpdateDocumentInput {
  id: ID!
  
  # Cho phép sửa thông tin cơ bản nếu nhập sai
  docCode: String
  docType: String
  recipient: String
  address: String
  dueDate: DateTime
  
  # Thay đổi người chịu trách nhiệm
  responsibleOfficialId: String

  # Nhập kết quả
  evidenceUrl: String
  deliveryMethod: String
  content: String
  status: DocumentStatus
  
  # Nhập chi phí
  distance: Float
  cost: Float
  fuelCost: Float
  otherCost: Float
  totalCost: Float
}

# 4. QUERY & MUTATION
extend type Query {
  # Lấy danh sách văn bản chi tiết
  getDocumentsByCourt(filter: GetDocsFilterInput!): DocumentPagination!
  
  # Lấy chi tiết 1 văn bản
  document(id: ID!): Document!
}

extend type Mutation {
  # Tạo mới văn bản
  createDocument(input: CreateDocumentInput!): Document!
  
  # Cập nhật văn bản
  updateDocument(input: UpdateDocumentInput!): Document!
  
  # Xóa văn bản
  deleteDocument(id: ID!): Boolean!
}