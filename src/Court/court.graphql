scalar DateTime

# 1. ENUM TRẠNG THÁI (Chỉ khai báo 1 lần ở đây, file khác tự hiểu)
enum DocumentStatus {
  WAITING   # Đợi tống đạt
  COMPLETED # Đã tống đạt (Có bằng chứng)
  CONFIRMED # Đã xác nhận
}

# 2. TYPE TÒA ÁN & NHÂN VIÊN
type Court {
  id: ID!
  name: String!
  address: String
  phone: String
  email: String
  courtNumber: Int
}

# Type nhân viên (Thêm vào để file Document dùng k bị lỗi)
type CourtStaff {
  id: ID!
  name: String!
  phone: String
  avatar: String
}

# 3. OBJECT TRẢ VỀ CHO DASHBOARD (Màn hình 1)
type CourtStats {
  id: ID!
  name: String!
  address: String
  waitingCount: Int!    # Cột "Số giấy tờ chưa tống đạt"
  overdueCount: Int!    # Cột "Số giấy tờ đến hạn/quá hạn"
}

type DashboardSummary {
  totalWaiting: Int!    # Tổng chưa tống đạt
  totalOverdue: Int!    # Tổng quá hạn
  totalStaff: Int!      # Nhân viên nhập liệu
  totalSecretary: Int!  # Thư ký
  courts: [CourtStats!]! # Danh sách tòa án ở dưới
}

# 4. QUERY DASHBOARD
type Query {
  dashboardStats(year: Int!, searchCourt: String): DashboardSummary!
}