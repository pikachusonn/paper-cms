scalar DateTime

enum Role {
  ADMIN
  STAFF
}

type Account {
  id: ID!
  email: String!
  fullName: String
  phone: String
  avatar: String
  role: Role!
}

type LoginResponse {
  accessToken: String!
  refreshToken: String!
  account: Account!
}

type AccountPagination {
  data: [Account!]!
  total: Int!
  page: Int!
  limit: Int!
  totalPages: Int!
}

# --- INPUTS ---

input LoginRequest {
  email: String!
  password: String!
}

input CreateAccountInput {
  email: String!
  fullName: String! # Map vào db
  phone: String
  role: Role
  # ĐÃ XÓA courtId
}

input ChangePasswordInput {
  userId: ID!
  oldPassword: String!
  newPassword: String!
}

input ResetPasswordInput {
  email: String!
  otp: String!
  newPassword: String!
}

input AccountFilterInput {
  page: Int
  limit: Int
  search: String # Tìm theo Tên hoặc Email
  role: Role
  # ĐÃ XÓA courtId (Vì Account k còn thuộc Court)
}

input UpdateAccountInput {
  id: ID! # ID tài khoản cần sửa
  name: String # Update fullName
  phone: String
  role: Role
  avatar: String
  # ĐÃ XÓA courtId
}

# --- QUERY ---

type Query {
  # Root Query (Nên để rỗng hoặc _empty để các file khác extend)
  _empty: String
}

extend type Query {
  # Lấy danh sách tất cả (cho dropdown nếu cần)
  accounts: [Account!]!

  # Lấy chi tiết 1 user
  account(id: ID!): Account!

  # Lấy danh sách phân trang (Màn hình Quản lý nhân sự)
  getAllAccounts(filter: AccountFilterInput): AccountPagination!
}

# --- MUTATION ---

type Mutation {
  # Root Mutation
  _empty: String
}

extend type Mutation {
  # 1. Login
  login(loginRequest: LoginRequest!): LoginResponse!

  # 2. Tạo tài khoản
  createAccount(input: CreateAccountInput!): Account!

  # 3. Đăng xuất
  logout(userId: ID!): Boolean!

  # 4. Đổi mật khẩu
  changePassword(input: ChangePasswordInput!): Boolean!

  # 5. Yêu cầu quên mật khẩu
  forgotPassword(email: String!): Boolean!

  # 6. Đặt lại mật khẩu
  resetPassword(input: ResetPasswordInput!): Boolean!

  # 7. Cập nhật thông tin
  updateAccount(input: UpdateAccountInput!): Account!

  # 8. Xóa tài khoản
  deleteAccount(id: ID!): Boolean!
}
