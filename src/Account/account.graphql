scalar DateTime

enum Role {
  ADMIN
  STAFF
}

type Account {
  id: ID!
  email: String!
  createdAt: DateTime
  avatar: String
  role: Role!
}

type LoginResponse {
  accessToken: String!
  refreshToken: String!
  account: Account!
}

# --- INPUTS ---

input LoginRequest {
  email: String!
  password: String!
}

input CreateAccountInput {
  email: String!
  role: Role!
  name: String!
  phone: String
  courtId: String!
}

input ChangePasswordInput {
  userId: ID!
  oldPassword: String!
  newPassword: String!
}

input ResetPasswordInput {
  email: String!
  otp: String!
  newPassword: String!
}

type AccountPagination {
  data: [Account!]!
  total: Int!
  page: Int!
  limit: Int!
  totalPages: Int!
}

input AccountFilterInput {
  page: Int
  limit: Int
  search: String   # Tìm theo Tên hoặc Email
  role: Role
  courtId: String  # Lọc nhân viên của tòa nào
}

input UpdateAccountInput {
  id: ID!          # ID tài khoản cần sửa
  name: String
  phone: String
  role: Role
  courtId: String  # Chuyển công tác sang tòa khác (nếu cần)
  avatar: String
}

# --- QUERY ---
# Giữ nguyên logic _empty nếu bạn dùng nó làm root,
# nhưng thường ta gom các query vào extend type Query
type Query {
  _empty: String
}

extend type Query {
  accounts: [Account!]!
  account(id: ID!): Account!
  getAllAccounts(filter: AccountFilterInput): AccountPagination!
}

# --- MUTATION (GỘP TẤT CẢ VÀO ĐÂY) ---
# Sửa lỗi: Thay vì viết type rồi extend nhiều lần, hãy viết hết vào 1 chỗ

type Mutation {
  # 1. Login
  login(loginRequest: LoginRequest!): LoginResponse!

  # 2. Tạo tài khoản
  createAccount(input: CreateAccountInput!): Account!

  # 3. Đăng xuất
  logout(userId: ID!): Boolean!

  # 4. Đổi mật khẩu
  changePassword(input: ChangePasswordInput!): Boolean!

  # 5. Yêu cầu quên mật khẩu
  forgotPassword(email: String!): Boolean!

  # 6. Đặt lại mật khẩu
  resetPassword(input: ResetPasswordInput!): Boolean!

  # 7. Cập nhật thông tin
  updateAccount(input: UpdateAccountInput!): Account!
  
  # 8. Xóa mềm user (Soft Delete)
  deleteAccount(id: ID!): Boolean!
}
